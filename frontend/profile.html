<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitFit | Profile</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container-fluid app-shell py-0">
        <a class="navbar-brand brand-title" href="dashboard.html">GitFit</a>
        <div class="d-flex gap-2">
          <a href="dashboard.html" class="btn btn-sm btn-outline-accent"
            >Dashboard</a
          >
          <button
            type="button"
            class="btn btn-sm btn-outline-danger"
            data-action="logout"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>

    <main class="app-shell">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-7">
          <section class="panel">
            <div class="panel-header">
              <h1 class="h3 mb-1">Your Profile</h1>
              <p class="text-muted-custom mb-0">
                Keep your basic stats updated.
              </p>
            </div>
            <div class="panel-body">
              <div id="profileMessage" class="alert d-none" role="alert"></div>
              <form id="profileForm">
                <div class="mb-3">
                  <label for="name" class="form-label">Name</label>
                  <input
                    type="text"
                    id="name"
                    class="form-control"
                    required
                    minlength="1"
                    maxlength="100"
                  />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input
                    type="email"
                    id="email"
                    class="form-control"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="weight" class="form-label">Weight</label>
                  <input
                    type="number"
                    id="weight"
                    class="form-control"
                    min="0"
                    step="0.1"
                  />
                </div>
                <div class="mb-3">
                  <label for="height" class="form-label">Height</label>
                  <input
                    type="number"
                    id="height"
                    class="form-control"
                    min="0"
                    step="0.1"
                  />
                </div>
                <button type="submit" class="btn btn-accent">
                  Update Profile
                </button>
              </form>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
