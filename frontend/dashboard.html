<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitFit | Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container-fluid app-shell py-0">
        <a class="navbar-brand brand-title" href="dashboard.html">GitFit</a>
        <div class="d-flex gap-2">
          <a href="profile.html" class="btn btn-sm btn-outline-accent"
            >Profile</a
          >
          <button
            type="button"
            class="btn btn-sm btn-outline-danger"
            data-action="logout"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>

    <main class="app-shell">
      <div id="dashboardMessage" class="alert d-none" role="alert"></div>

      <div class="row g-3">
        <div class="col-12 col-lg-4">
          <section class="panel h-100">
            <div class="panel-header">
              <h2 class="h4 mb-1">Add Workout</h2>
              <p class="text-muted-custom mb-0">Log one training entry.</p>
            </div>
            <div class="panel-body">
              <form id="workoutForm">
                <div class="mb-3">
                  <label for="muscle_group" class="form-label"
                    >Muscle Group</label
                  >
                  <select
                    id="muscle_group"
                    class="form-select"
                    required
                  ></select>
                </div>
                <div class="mb-3">
                  <label for="exercise_name" class="form-label">Exercise</label>
                  <select
                    id="exercise_name"
                    class="form-select"
                    required
                  ></select>
                </div>
                <div class="mb-3">
                  <label for="sets" class="form-label">Sets</label>
                  <input
                    type="number"
                    id="sets"
                    class="form-control"
                    min="1"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="reps" class="form-label">Reps</label>
                  <input
                    type="number"
                    id="reps"
                    class="form-control"
                    min="1"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="weight" class="form-label">Weight</label>
                  <input
                    type="number"
                    id="weight"
                    class="form-control"
                    min="0"
                    step="0.5"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-accent w-100">
                  Save Workout
                </button>
              </form>
            </div>
          </section>
        </div>

        <div class="col-12 col-lg-8">
          <section class="panel mb-3">
            <div class="panel-header">
              <h2 class="h4 mb-1">Workout History</h2>
              <p class="text-muted-custom mb-0">
                Latest entries appear first. PR rows are highlighted.
              </p>
            </div>
            <div class="panel-body p-0">
              <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                  <thead>
                    <tr>
                      <th>Exercise</th>
                      <th>Muscle</th>
                      <th>Sets</th>
                      <th>Reps</th>
                      <th>Weight</th>
                      <th>Date</th>
                      <th>Action</th>
                    </tr>
                  </thead>
                  <tbody id="workoutsTableBody"></tbody>
                </table>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2 class="h4 mb-1">Progress Analyzer</h2>
              <p class="text-muted-custom mb-0">
                Select an exercise to see weight progression over time.
              </p>
            </div>
            <div class="panel-body">
              <div class="row g-3 mb-3">
                <div class="col-12 col-md-6">
                  <label for="chart_exercise" class="form-label"
                    >Exercise</label
                  >
                  <select id="chart_exercise" class="form-select"></select>
                </div>
              </div>
              <p id="chartEmpty" class="text-muted-custom">
                No data yet for selected exercise.
              </p>
              <div style="height: 300px">
                <canvas id="progressChart"></canvas>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
